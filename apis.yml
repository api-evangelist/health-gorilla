aid: health-gorilla
url: https://raw.githubusercontent.com/api-evangelist/health-gorilla/refs/heads/main/apis.yml
name: Health Gorilla
kind: company
description: Health Gorilla operates a national health-data interoperability network
  and a FHIR-first API suite for healthcare developers. Its HL7 FHIR R4 REST API
  provides access to patient records, person-authorized record retrieval across
  national exchange networks (QHIN / TEFCA), diagnostic (lab and radiology)
  ordering and results, clinical documents, and coverage/eligibility data under
  OAuth 2.0.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Health
- Interoperability
- FHIR
- Clinical Data
- Lab Ordering
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
